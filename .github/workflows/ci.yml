name: Backend CI Pipeline

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    # 1. Khởi tạo Database ảo (Service Container) để chạy Integration Test
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_bds_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven' # Tự động cache thư viện maven để build nhanh hơn

    - name: Đảm bảo quyền thực thi cho Maven Wrapper
      run: chmod +x mvnw

    - name: Build & Compile (Check MapStruct)
      run: ./mvnw clean compile

    - name: Run Unit Tests & Coverage
      env:
        # Cấp biến môi trường ảo để test. (Tránh lỗi Missing Placeholder)
        DB_URL: jdbc:postgresql://localhost:5432/test_bds_db
        DB_USERNAME: test_user
        DB_PASSWORD: test_password
        JWT_SECRET: dummy_secret_key_for_testing_must_be_long_enough
        MAIL_USERNAME: test@gmail.com
        MAIL_PASSWORD: testpassword
        CLOUDINARY_CLOUD_NAME: test
        CLOUDINARY_API_KEY: test
        CLOUDINARY_API_SECRET: test
        SPRING_PROFILES_ACTIVE: default
      run: ./mvnw test jacoco:report

    # (Tùy chọn) Upload test report để xem trên GitHub Actions
    - name: Upload Test Report
      if: always() # Chạy dù test pass hay fail
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: target/surefire-reports/
