name: Backend CD Pipeline (Docker Hub)

on:
  push:
    branches: [ "main", "chore/docker-setup" ] # Thêm nhánh hiện tại để test thử
  workflow_dispatch: # Cho phép bấm chạy bằng tay trên GitHub

jobs:
  build-and-push-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Cài đặt công cụ build Docker nâng cao
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Đăng nhập vào Docker Hub bằng Username và Password lấy từ GitHub Secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build ảnh từ file Dockerfile và Push thẳng lên Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true # Cho phép đẩy lên mạng
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/qlbds-api:latest
          ${{ secrets.DOCKER_USERNAME }}/qlbds-api:${{ github.sha }}
        # Tối ưu thời gian build bằng cách dùng cache
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/qlbds-api:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/qlbds-api:buildcache,mode=max
